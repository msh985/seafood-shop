<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>扫码下单 - 朱家尖海鲜配送</title>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js">
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:#0a7cbf;text-align:center;padding:40px 20px;min-height:100vh}
.card{background:#fff;border-radius:20px;padding:32px 24px;max-width:360px;margin:0 auto;box-shadow:0 8px 40px rgba(0,0,0,.2)}
.card h2{color:#0a7cbf;font-size:22px;margin-bottom:4px}
.card .sub{color:#999;font-size:13px;margin-bottom:20px}
.qr-wrap{display:inline-block;background:#fff;padding:16px;border-radius:12px;border:2px dashed #e0e0e0;margin-bottom:16px}
.url{font-size:12px;color:#0a7cbf;word-break:break-all;margin:12px 0}
.tip{font-size:13px;color:#666;background:#f8f8f8;padding:10px;border-radius:8px;margin-top:12px}
</style>
</head>
<body>
<div class="card">
  <h2>朱家尖海鲜配送</h2>
  <p class="sub">微信扫一扫 直接下单</p>
  <div class="qr-wrap" id="qrcode"></div>
  <div class="url">msh985.github.io/seafood-shop</div>
  <div class="tip">
    <strong>📱 使用方法：</strong><br>
    1. 打开微信扫一扫<br>
    2. 扫描上方二维码<br>
    3. 进入商城选购下单<br>
    <span style="font-size:11px;color:#999">下单后一小时内配送到车</span>
  </div>
</div>
<script>
var qr = new QRCode(document.getElementById("qrcode"), {
  text: "https://msh985.github.io/seafood-shop/",
  width: 240,
  height: 240,
  colorDark: "#000000",
  colorLight: "#ffffff",
  correctLevel: QRCode.CorrectLevel.M
});
</script>
</body>
</html>
