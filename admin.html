<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>后台管理 - 朱家尖海鲜配送</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:#f0f2f5;color:#333}
#loginGate{position:fixed;top:0;left:0;right:0;bottom:0;background:#1a1a2e;z-index:99999;display:flex;align-items:center;justify-content:center}
#loginGate .box{background:#fff;border-radius:16px;padding:40px 32px;text-align:center;width:90%;max-width:360px;box-shadow:0 8px 40px rgba(0,0,0,.3)}
#loginGate h2{color:#1a1a2e;margin-bottom:6px;font-size:20px}
#loginGate input{width:100%;padding:12px 16px;border:1px solid #ddd;border-radius:10px;font-size:15px;text-align:center;outline:none;margin-bottom:12px}
#loginGate button{width:100%;padding:12px;background:#0a7cbf;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer}
#loginGate .err{color:#ff4444;font-size:12px;margin-top:8px;display:none}
.layout{display:flex;min-height:100vh}
.sidebar{width:200px;background:#1a1a2e;color:#fff;padding:20px 0;flex-shrink:0}
.sidebar h2{padding:0 20px 20px;font-size:16px;border-bottom:1px solid rgba(255,255,255,.1);margin-bottom:8px}
.sidebar a{display:block;padding:12px 20px;color:rgba(255,255,255,.7);text-decoration:none;font-size:14px;cursor:pointer}
.sidebar a:hover,.sidebar a.active{background:rgba(255,255,255,.08);color:#fff}
.main{flex:1;padding:24px;overflow-y:auto}
.page{display:none}
.page.active{display:block}
.toolbar{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.toolbar input,.toolbar select{padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;outline:none}
.btn{padding:8px 18px;border:none;border-radius:8px;font-size:14px;cursor:pointer;font-weight:500}
.btn-blue{background:#0a7cbf;color:#fff}
.btn-green{background:#28a745;color:#fff}
.btn-red{background:#dc3545;color:#fff}
.btn-gray{background:#f0f0f0;color:#333;border:1px solid #ddd}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
th{text-align:left;padding:10px 14px;background:#fafbfc;font-size:12px;color:#888;border-bottom:1px solid #eee}
td{padding:8px 14px;border-bottom:1px solid #f5f5f5;font-size:13px}
.badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:500}
.badge-pub{background:#e8f5e9;color:#2e7d32}
.badge-unpub{background:#fff3e0;color:#e65100}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:1000;display:none;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:16px;width:90%;max-width:500px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid #eee}
.modal-body{padding:16px 20px}
.modal-body label{display:block;font-size:13px;font-weight:600;color:#555;margin-bottom:4px;margin-top:12px}
.modal-body input,.modal-body select,.modal-body textarea{width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;outline:none;margin-bottom:8px}
.modal-body textarea{height:60px;resize:none}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 24px;border-radius:20px;font-size:14px;z-index:9999;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
.product-img-preview{width:80px;height:80px;border-radius:8px;background:#f0f4f8;display:flex;align-items:center;justify-content:center;font-size:30px;overflow:hidden}
.product-img-preview img{width:100%;height:100%;object-fit:cover}
.setting-row{display:flex;gap:12px;align-items:center;margin-bottom:12px}
.setting-row label{min-width:80px;font-weight:600}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.stat-card{background:#fff;border-radius:10px;padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.06);text-align:center}
.stat-card .num{font-size:24px;font-weight:700}
.stat-card .label{font-size:11px;color:#999;margin-top:2px}
</style>
</head>
<body>

<!-- LOGIN GATE -->
<div id="loginGate">
  <div class="box">
    <div style="font-size:48px;margin-bottom:8px">🔒</div>
    <h2>后台管理</h2>
    <p style="color:#999;font-size:13px;margin-bottom:16px" id="loginMsg">请输入管理密码</p>
    <input type="password" id="pwdInput" placeholder="输入密码">
    <button onclick="doLogin()">进入管理</button>
    <p class="err" id="loginErr">密码错误，请重试</p>
  </div>
</div>

<!-- MAIN LAYOUT -->
<div class="layout" id="mainLayout" style="display:none">
  <div class="sidebar">
    <h2>🦐 后台管理</h2>
    <a class="active" onclick="showPage('products',this)">📦 商品管理</a>
    <a onclick="showPage('orders',this)">📋 订单记录</a>
    <a onclick="showPage('settings',this)">⚙️ 店铺设置</a>
    <a href="index.html" target="_blank">👁️ 预览店铺 →</a>
  </div>
  <div class="main">
    <!-- PRODUCTS PAGE -->
    <div class="page active" id="page-products">
      <h2>📦 商品管理</h2>
      <div class="toolbar">
        <input type="text" id="searchInput" placeholder="🔍 搜索..." oninput="renderTable()">
        <select id="filterStatus" onchange="renderTable()">
          <option value="all">全部状态</option>
          <option value="published">已上架</option>
          <option value="unpublished">已下架</option>
        </select>
        <button class="btn btn-blue" onclick="openAddModal()">+ 添加商品</button>
        <button class="btn btn-gray" onclick="resetDefault()">🔄 恢复默认</button>
      </div>
      <table>
        <thead><tr><th>图片</th><th>名称</th><th>分类</th><th>价格</th><th>状态</th><th>操作</th></tr></thead>
        <tbody id="productTbody"></tbody>
      </table>
    </div>
    <!-- ORDERS PAGE -->
    <div class="page" id="page-orders">
      <h2>📋 订单记录</h2>
      <div class="toolbar">
        <select id="orderFilter" onchange="renderOrders()">
          <option value="all">全部状态</option><option value="待确认">待确认</option><option value="备货中">备货中</option><option value="配送中">配送中</option><option value="已完成">已完成</option><option value="已取消">已取消</option>
        </select>
      </div>
      <div id="orderStats" class="stats" style="margin-bottom:16px"></div>
      <table>
        <thead><tr><th>订单号</th><th>客户</th><th>商品</th><th>金额</th><th>付款</th><th>状态</th><th>时间</th><th>操作</th></tr></thead>
        <tbody id="orderTbody"></tbody>
      </table>
    </div>
    <!-- SETTINGS PAGE -->
    <div class="page" id="page-settings">
      <h2>⚙️ 店铺设置</h2>
      <div class="setting-row"><label>店铺名称</label><input type="text" id="setName"></div>
      <div class="setting-row"><label>联系电话</label><input type="text" id="setPhone"></div>
      <div class="setting-row"><label>配送范围</label><input type="text" id="setArea"></div>
      <div class="setting-row"><label>收款码</label><input type="file" id="payQrFile" accept="image/*" onchange="uploadPayQr(event)"></div>
      <div id="payQrPreview" style="margin:12px 0"></div>
      <button class="btn btn-blue" onclick="saveSettings()">保存设置</button>
    </div>
  </div>
</div>

<!-- PRODUCT MODAL -->
<div class="modal-overlay" id="productModal">
  <div class="modal">
    <div class="modal-header"><h3 id="modalTitle">添加商品</h3><button class="btn btn-gray" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <label>商品名称</label><input type="text" id="editName">
      <label>分类</label><select id="editCat"><option value="ice">冰鲜</option><option value="live">活鲜</option><option value="dry">干货特产</option><option value="gift">礼盒套餐</option></select>
      <label>价格 (元)</label><input type="number" id="editPrice" step="0.01">
      <label>单位</label><input type="text" id="editUnit" placeholder="斤/条/袋/套">
      <label>描述</label><textarea id="editDesc"></textarea>
      <label>标签</label><input type="text" id="editTag" placeholder="爆款/招牌/时令">
      <label>图片URL</label><input type="text" id="editImg" placeholder="或上传图片">
      <input type="file" id="editImgFile" accept="image/*" onchange="previewImgFile(event)">
      <div class="product-img-preview" id="imgPreview" style="display:none"></div>
      <label>排序</label><input type="number" id="editSort" value="0">
    </div>
    <div style="padding:16px 20px;border-top:1px solid #eee;text-align:right">
      <button class="btn btn-gray" onclick="closeModal()">取消</button>
      <button class="btn btn-blue" id="modalSaveBtn" onclick="saveProduct()">保存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============ LOGIN ============
function doLogin() {
  var pwd = document.getElementById("pwdInput").value;
  if (pwd === "mashihong199856") {
    document.getElementById("loginGate").style.display = "none";
    document.getElementById("mainLayout").style.display = "flex";
    renderTable();
  } else {
    document.getElementById("pwdInput").value = "";
    document.getElementById("loginErr").style.display = "block";
  }
}
document.getElementById("pwdInput").onkeydown = function(e) {
  if (e.keyCode === 13) doLogin();
};
// Show JS is running
document.getElementById("loginMsg").textContent = "JS OK - 请输入管理密码";

// ============ DATA ============
var defaultProducts = [
  {id:1,name:"舟山带鱼（中段）",cat:"ice",img:"",desc:"本地雷达网带鱼",price:68,unit:"斤",tag:"爆款",published:true},
  {id:2,name:"东海大黄鱼",cat:"ice",img:"",desc:"舟山野生大黄鱼",price:158,unit:"条(500g)",tag:"",published:true},
  {id:3,name:"舟山鲳鱼",cat:"ice",img:"",desc:"平川鲳鱼刺少肉多",price:88,unit:"斤",tag:"",published:true},
  {id:4,name:"墨鱼/目鱼",cat:"ice",img:"",desc:"新鲜墨鱼",price:45,unit:"斤",tag:"",published:true},
  {id:5,name:"红膏呛蟹",cat:"ice",img:"",desc:"舟山招牌咸鲜入味",price:98,unit:"只",tag:"招牌",published:true},
  {id:6,name:"舟山梭子蟹",cat:"live",img:"",desc:"鲜活梭子蟹膏肥肉满",price:128,unit:"斤",tag:"时令",published:true},
  {id:7,name:"皮皮虾/虾蛄",cat:"live",img:"",desc:"鲜活虾蛄椒盐一绝",price:78,unit:"斤",tag:"",published:true},
  {id:8,name:"基围虾",cat:"live",img:"",desc:"活蹦乱跳白灼最佳",price:68,unit:"斤",tag:"",published:true},
  {id:9,name:"花蛤/文蛤",cat:"live",img:"",desc:"吐好沙辣炒鲜美",price:18,unit:"斤",tag:"实惠",published:true},
  {id:10,name:"舟山虾皮",cat:"dry",img:"",desc:"淡干虾皮补钙首选",price:35,unit:"袋(250g)",tag:"必买",published:true},
  {id:11,name:"鱿鱼丝/墨鱼丝",cat:"dry",img:"",desc:"即食海鲜零食",price:28,unit:"袋(200g)",tag:"",published:true},
  {id:12,name:"紫菜（头水）",cat:"dry",img:"",desc:"头水紫菜煮汤鲜",price:32,unit:"包(100g)",tag:"",published:true},
  {id:13,name:"舟山鱼片干",cat:"dry",img:"",desc:"马鲛鱼片干嚼劲十足",price:25,unit:"袋(200g)",tag:"",published:true},
  {id:14,name:"海鲜零食礼包",cat:"gift",img:"",desc:"虾皮+鱿鱼丝+鱼片+紫菜",price:108,unit:"套",tag:"送礼",published:true},
  {id:15,name:"冰鲜三件套",cat:"gift",img:"",desc:"带鱼+鲳鱼+墨鱼泡沫箱",price:188,unit:"套",tag:"划算",published:true},
  {id:16,name:"豪华海鲜礼盒",cat:"gift",img:"",desc:"黄鱼+梭子蟹+带鱼+鲳鱼+虾皮",price:388,unit:"套",tag:"高端",published:true}
];

function loadProducts() {
  try {
    var raw = localStorage.getItem("seafood_shop_products");
    if (raw) { var data = JSON.parse(raw); if (data.length > 0) return data; }
  } catch(e) {}
  return JSON.parse(JSON.stringify(defaultProducts));
}
function saveProducts(data) {
  try { localStorage.setItem("seafood_shop_products", JSON.stringify(data)); } catch(e) {}
}

// ============ PAGE SWITCHING ============
function showPage(name, el) {
  var pages = document.getElementsByClassName("page");
  for (var i = 0; i < pages.length; i++) { pages[i].classList.remove("active"); }
  document.getElementById("page-" + name).classList.add("active");
  var links = document.querySelectorAll(".sidebar a");
  for (var j = 0; j < links.length; j++) { links[j].classList.remove("active"); }
  el.classList.add("active");
  if (name === "products") renderTable();
  if (name === "orders") renderOrders();
  if (name === "settings") loadSettings();
}

// ============ PRODUCTS ============
var editingId = null;
var tempImg = "";

function renderTable() {
  var products = loadProducts();
  var search = (document.getElementById("searchInput").value || "").toLowerCase();
  var status = document.getElementById("filterStatus").value;
  if (search) products = products.filter(function(p){ return p.name.toLowerCase().indexOf(search) !== -1; });
  if (status === "published") products = products.filter(function(p){ return p.published !== false; });
  if (status === "unpublished") products = products.filter(function(p){ return p.published === false; });
  products.sort(function(a,b){ return a.id - b.id; });
  
  var catMap = {ice:"冰鲜",live:"活鲜",dry:"干货特产",gift:"礼盒套餐"};
  var html = "";
  for (var i = 0; i < products.length; i++) {
    var p = products[i];
    var statusBtn = p.published !== false 
      ? '<span class="badge badge-pub" style="cursor:pointer" onclick="togglePublish('+p.id+')">🔴 已上架</span>'
      : '<span class="badge badge-unpub" style="cursor:pointer" onclick="togglePublish('+p.id+')">🟢 已下架</span>';
    html += "<tr>" +
      "<td>"+(p.img?'<img src="'+p.img+'" style="width:40px;height:40px;border-radius:6px;object-fit:cover">':'🐟')+"</td>" +
      "<td><strong>"+p.name+"</strong>"+(p.tag?'<br><small style="color:#ff6b35">'+p.tag+'</small>':'')+"</td>" +
      "<td>"+(catMap[p.cat]||p.cat)+"</td>" +
      "<td style='color:#ff4444;font-weight:600'>¥"+p.price+"/"+p.unit+"</td>" +
      "<td>"+statusBtn+"</td>" +
      "<td>" +
        "<button class='btn btn-gray' style='padding:4px 10px;font-size:12px' onclick='openEditModal("+p.id+")'>✏️</button> " +
        "<button class='btn btn-red' style='padding:4px 10px;font-size:12px' onclick='deleteProduct("+p.id+")'>🗑</button>" +
      "</td>" +
      "</tr>";
  }
  document.getElementById("productTbody").innerHTML = html || '<tr><td colspan="6" style="text-align:center;padding:40px;color:#999">暂无商品</td></tr>';
}

function togglePublish(id) {
  var products = loadProducts();
  for (var i = 0; i < products.length; i++) {
    if (products[i].id === id) {
      products[i].published = products[i].published === false ? true : false;
      break;
    }
  }
  saveProducts(products);
  renderTable();
  toast(products.filter(function(p){return p.id===id})[0].published!==false?"已上架":"已下架");
}

function openAddModal() {
  editingId = null; tempImg = "";
  document.getElementById("modalTitle").textContent = "添加商品";
  document.getElementById("editName").value = "";
  document.getElementById("editCat").value = "ice";
  document.getElementById("editPrice").value = "";
  document.getElementById("editUnit").value = "";
  document.getElementById("editDesc").value = "";
  document.getElementById("editTag").value = "";
  document.getElementById("editImg").value = "";
  document.getElementById("editSort").value = "0";
  document.getElementById("editImgFile").value = "";
  document.getElementById("imgPreview").style.display = "none";
  document.getElementById("productModal").classList.add("show");
}

function openEditModal(id) {
  var products = loadProducts();
  var p = null;
  for (var i = 0; i < products.length; i++) { if (products[i].id === id) { p = products[i]; break; } }
  if (!p) return;
  editingId = id;
  tempImg = p.img || "";
  document.getElementById("modalTitle").textContent = "编辑商品";
  document.getElementById("editName").value = p.name;
  document.getElementById("editCat").value = p.cat;
  document.getElementById("editPrice").value = p.price;
  document.getElementById("editUnit").value = p.unit;
  document.getElementById("editDesc").value = p.desc || "";
  document.getElementById("editTag").value = p.tag || "";
  document.getElementById("editImg").value = p.img || "";
  document.getElementById("editSort").value = "0";
  document.getElementById("editImgFile").value = "";
  if (tempImg) { document.getElementById("imgPreview").style.display = "flex"; document.getElementById("imgPreview").innerHTML = '<img src="'+tempImg+'">'; }
  else { document.getElementById("imgPreview").style.display = "none"; }
  document.getElementById("productModal").classList.add("show");
}

function closeModal() {
  document.getElementById("productModal").classList.remove("show");
}

function previewImgFile(e) {
  var file = e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    tempImg = ev.target.result;
    document.getElementById("imgPreview").style.display = "flex";
    document.getElementById("imgPreview").innerHTML = '<img src="'+tempImg+'">';
  };
  reader.readAsDataURL(file);
}

function saveProduct() {
  var name = document.getElementById("editName").value.trim();
  var cat = document.getElementById("editCat").value;
  var price = parseFloat(document.getElementById("editPrice").value);
  var unit = document.getElementById("editUnit").value.trim();
  var desc = document.getElementById("editDesc").value.trim();
  var tag = document.getElementById("editTag").value.trim();
  var imgUrl = document.getElementById("editImg").value.trim();
  var img = tempImg || imgUrl;
  var sort = parseInt(document.getElementById("editSort").value) || 0;
  if (!name) { toast("请输入商品名称"); return; }
  if (!price || price <= 0) { toast("请输入有效价格"); return; }
  if (!unit) { toast("请输入单位"); return; }
  
  var products = loadProducts();
  if (editingId) {
    for (var i = 0; i < products.length; i++) {
      if (products[i].id === editingId) {
        products[i].name = name; products[i].cat = cat; products[i].price = price;
        products[i].unit = unit; products[i].desc = desc; products[i].tag = tag;
        products[i].img = img;
        break;
      }
    }
    toast("商品已更新");
  } else {
    var maxId = 0;
    for (var j = 0; j < products.length; j++) { if (products[j].id > maxId) maxId = products[j].id; }
    products.push({id:maxId+1,name:name,cat:cat,price:price,unit:unit,desc:desc,tag:tag,img:img,published:true});
    toast("商品已添加");
  }
  saveProducts(products);
  closeModal();
  renderTable();
}

function deleteProduct(id) {
  if (!confirm("确定删除？")) return;
  var products = loadProducts();
  var filtered = [];
  for (var i = 0; i < products.length; i++) { if (products[i].id !== id) filtered.push(products[i]); }
  saveProducts(filtered);
  renderTable();
  toast("已删除");
}

function resetDefault() {
  if (!confirm("恢复默认商品列表？当前修改将丢失！")) return;
  saveProducts(JSON.parse(JSON.stringify(defaultProducts)));
  renderTable();
  toast("已恢复默认");
}

// ============ ORDERS ============
function loadOrders() {
  try {
    var raw = localStorage.getItem("seafood_shop_orders");
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return [];
}

function renderOrders() {
  var orders = loadOrders();
  var filter = document.getElementById("orderFilter").value;
  if (filter !== "all") orders = orders.filter(function(o){ return o.status === filter; });
  
  // Stats
  var all = loadOrders();
  var stats = {
    "待确认": all.filter(function(o){return o.status==="待确认"}).length,
    "备货中": all.filter(function(o){return o.status==="备货中"}).length,
    "配送中": all.filter(function(o){return o.status==="配送中"}).length,
    "已完成": all.filter(function(o){return o.status==="已完成"}).length
  };
  document.getElementById("orderStats").innerHTML = 
    '<div class="stat-card"><div class="num">'+stats["待确认"]+'</div><div class="label">待确认</div></div>' +
    '<div class="stat-card"><div class="num">'+stats["备货中"]+'</div><div class="label">备货中</div></div>' +
    '<div class="stat-card"><div class="num">'+stats["配送中"]+'</div><div class="label">配送中</div></div>' +
    '<div class="stat-card"><div class="num">'+stats["已完成"]+'</div><div class="label">已完成</div></div>';
  
  var html = "";
  var statuses = ["待确认","备货中","配送中","已完成","已取消"];
  for (var i = 0; i < orders.length; i++) {
    var o = orders[i];
    var optHtml = "";
    for (var j = 0; j < statuses.length; j++) {
      optHtml += '<option value="'+statuses[j]+'"'+(o.status===statuses[j]?' selected':'')+'>'+statuses[j]+'</option>';
    }
    html += "<tr>" +
      "<td style='font-size:11px;font-family:monospace'>"+o.orderNo+"</td>" +
      "<td><strong>"+o.name+"</strong><br><small style='color:#888'>"+o.phone+"</small></td>" +
      "<td style='font-size:12px'>"+o.items.map(function(x){return x.name+"×"+x.qty}).join("<br>")+"</td>" +
      "<td style='color:#ff4444;font-weight:600'>¥"+o.total+"</td>" +
      "<td>"+(o.paid?'<span style="color:#28a745">✓ 已付</span>':'<span style="color:#ff6b35">待付款</span>')+"</td>" +
      "<td><select style='padding:4px 8px;border-radius:6px;border:1px solid #ddd;font-size:12px' onchange='updateOrderStatus("+i+",this.value)'>"+optHtml+"</select></td>" +
      "<td style='font-size:11px;color:#999'>"+o.time+"</td>" +
      "<td><button class='btn btn-red' style='padding:4px 10px;font-size:11px' onclick='deleteOrder("+i+")'>🗑</button></td>" +
      "</tr>";
  }
  document.getElementById("orderTbody").innerHTML = html || '<tr><td colspan="8" style="text-align:center;padding:40px;color:#999">暂无订单</td></tr>';
}

function updateOrderStatus(idx, status) {
  var orders = loadOrders();
  orders[idx].status = status;
  try { localStorage.setItem("seafood_shop_orders", JSON.stringify(orders)); } catch(e) {}
  renderOrders();
  toast("状态已更新: " + status);
}

function deleteOrder(idx) {
  if (!confirm("确定删除？")) return;
  var orders = loadOrders();
  orders.splice(idx, 1);
  try { localStorage.setItem("seafood_shop_orders", JSON.stringify(orders)); } catch(e) {}
  renderOrders();
  toast("订单已删除");
}

// ============ SETTINGS ============
function loadSettings() {
  try {
    var s = JSON.parse(localStorage.getItem("seafood_shop_settings") || "{}");
    document.getElementById("setName").value = s.name || "朱家尖海鲜配送";
    document.getElementById("setPhone").value = s.phone || "";
    document.getElementById("setArea").value = s.area || "";
    if (s.payQr) {
      document.getElementById("payQrPreview").innerHTML = '<img src="'+s.payQr+'" style="width:180px;border-radius:8px">';
    }
  } catch(e) {}
}

function saveSettings() {
  var s = {
    name: document.getElementById("setName").value.trim(),
    phone: document.getElementById("setPhone").value.trim(),
    area: document.getElementById("setArea").value.trim()
  };
  try {
    var old = JSON.parse(localStorage.getItem("seafood_shop_settings") || "{}");
    if (old.payQr) s.payQr = old.payQr;
    localStorage.setItem("seafood_shop_settings", JSON.stringify(s));
  } catch(e) {}
  toast("设置已保存");
}

function uploadPayQr(e) {
  var file = e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    document.getElementById("payQrPreview").innerHTML = '<img src="'+ev.target.result+'" style="width:180px;border-radius:8px">';
    try {
      var s = JSON.parse(localStorage.getItem("seafood_shop_settings") || "{}");
      s.payQr = ev.target.result;
      localStorage.setItem("seafood_shop_settings", JSON.stringify(s));
    } catch(ex) {}
    toast("收款码已保存");
  };
  reader.readAsDataURL(file);
}

// ============ UTILS ============
function toast(msg) {
  var t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(t._timer);
  t._timer = setTimeout(function(){ t.classList.remove("show"); }, 2000);
}
</script>
