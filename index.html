// ============ RENDER SHOP ============
function renderP(){
  var el=document.getElementById("productList");
  var f=curCat==="all"?products:products.filter(function(p){return p.cat===curCat});
  if(!f.length){el.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:40px;color:#999">鏆傛棤鍟嗗搧</div>';return}
  el.innerHTML=f.map(function(p){
    var ih=p.img?'<img src="'+p.img+'" style="width:100%;height:100%;object-fit:cover">':'<span class="emoji">'+(p.emoji||"馃悷")+'</span>';
    return '<div class="product-card"><div class="product-img">'+ih+(p.tag?'<span class="tag">'+p.tag+'</span>':'')+'</div><div class="product-info"><div class="product-name">'+p.name+'</div><div class="product-desc">'+p.desc+'</div><div class="product-bottom"><div><span class="product-price">楼'+p.price+'</span><span class="product-unit"> /'+p.unit+'</span></div><button class="add-btn" onclick="addCart('+p.id+')">+</button></div></div></div>';
  }).join("");
}
function addCart(id){
  var p=products.filter(function(x){return x.id===id})[0];if(!p)return;
  var e=cart.filter(function(x){return x.id===id})[0];
  if(e)e.qty++;else cart.push({id:p.id,name:p.name,price:p.price,unit:p.unit,emoji:p.emoji,img:p.img,qty:1});
  renderCart();toast("宸插姞鍏ワ細"+p.name);
}
function chQty(i,d){cart[i].qty+=d;if(cart[i].qty<=0)cart.splice(i,1);renderCart()}
function clearCart(){cart=[];renderCart()}
function renderCart(){
  var c=document.getElementById("cartItems");
  if(!cart.length){c.innerHTML='<div class="cart-empty">馃洅<p style="font-size:14px;color:#999;margin-top:8px">璐墿杞︽槸绌虹殑</p></div>'}
  else{c.innerHTML=cart.map(function(it,i){
    var ig=it.img?'<img src="'+it.img+'" style="width:100%;height:100%;object-fit:cover">':'<span style="font-size:32px">'+(it.emoji||"馃悷")+'</span>';
    return '<div class="cart-item"><div class="cimg">'+ig+'</div><div class="cinfo"><div class="cname">'+it.name+'</div><div class="cprice">楼'+it.price+'/'+it.unit+'</div></div><div class="cart-qty"><button class="qty-btn" onclick="chQty('+i+',-1)">-</button><span class="qty-num">'+it.qty+'</span><button class="qty-btn" onclick="chQty('+i+',1)">+</button></div></div>';
  }).join("")}
  updTotals();
}
function updTotals(){
  var n=cart.reduce(function(s,i){return s+i.qty},0);

  document.getElementById("cartTotal").textContent="楼"+t;
  document.getElementById("footerTotal").textContent="楼"+t;
  document.getElementById("footerCount").textContent=n?"鍏?+n+"浠跺晢鍝?:"鏈€夊晢鍝?;

  if(n){b.style.display="flex";b.textContent=n>99?"99+":n}else{b.style.display="none"}
  document.getElementById("footerCheckout").disabled=!n;
}

  var st=document.getElementById("ofStatus").value;
  if(st!=="all")os=os.filter(function(o){return o.status===st});
  if(!os.length){el.innerHTML='<div style="padding:20px;text-align:center;color:#999">鏆傛棤璁㈠崟</div>';return}
  var sm={pending:"馃敶 寰呭鐞?,paid:"馃煛 宸蹭粯娆?,delivering:"馃數 閰嶉€佷腑",done:"鉁?宸插畬鎴?,cancelled:"鈿?宸插彇娑?};
  el.innerHTML=os.map(function(o){
    var is=o.items.map(function(i){return i.name+"脳"+i.qty}).join("銆?);
    return '<div class="admin-item"><div class="ainfo"><div class="n">'+o.id+' <span style="font-size:11px;color:#999">'+o.time+'</span></div><div class="d">'+is+' 路 楼'+o.total+' 路 '+o.name+' 路 '+o.phone+'</div><div class="d">馃搷'+o.location+(o.car?' 路 馃殫'+o.car:'')+(o.note?' 路 馃挰'+o.note:'')+'</div></div><div style="text-align:right;white-space:nowrap"><div style="font-size:12px;font-weight:600">'+(sm[o.status]||o.status)+'</div><div style="margin-top:4px">'
      +(o.status==="pending"?'<button class="abtn abtn-green" style="font-size:10px;padding:3px 8px" onclick="updOrder(\''+o.id+'\',\'paid\')">鏍囪浠樻</button> ':'')
      +(o.status==="paid"?'<button class="abtn abtn-blue" style="font-size:10px;padding:3px 8px" onclick="updOrder(\''+o.id+'\',\'delivering\')">寮€濮嬮厤閫?/button> ':'')
      +(o.status==="delivering"?'<button class="abtn abtn-green" style="font-size:10px;padding:3px 8px" onclick="updOrder(\''+o.id+'\',\'done\')">瀹屾垚</button> ':'')
      +((o.status==="pending"||o.status==="paid")?'<button class="abtn abtn-red" style="font-size:10px;padding:3px 8px" onclick="updOrder(\''+o.id+'\',\'cancelled\')">鍙栨秷</button>':'')
      +'</div></div></div>';
  }).join("");refreshStats();
}
function updOrder(id,st){var os=loadO();for(var i=0;i<os.length;i++)if(os[i].id===id){os[i].status=st;break}saveO(os);renderAdminOrders();toast("璁㈠崟鐘舵€佸凡鏇存柊")}

// ============ ADMIN SETTINGS ============
function loadStoForm(){
  var s=loadS();
  document.getElementById("setShop").value=s.shopName||"";document.getElementById("setPhone").value=s.phone||"";
  document.getElementById("setDelivery").value=s.deliveryNote||"";document.getElementById("setPayNote").value=s.payNote||"";
  document.getElementById("setPwd").value="";var pr=document.getElementById("payQrPreview");
  if(s.payQr){pr.src=s.payQr;pr.style.display="block"}else{pr.style.display="none"}
}
function handlePayQr(inp){
  if(!inp.files||!inp.files[0])return;var r=new FileReader();
  r.onload=function(e){var pr=document.getElementById("payQrPreview");pr.src=e.target.result;pr.style.display="block"};r.readAsDataURL(inp.files[0]);
}
function saveSettings(){
  var pwd=document.getElementById("setPwd").value.trim();if(pwd)localStorage.setItem(PK,pwd);
  var pr=document.getElementById("payQrPreview");
  var s={shopName:document.getElementById("setShop").value.trim(),phone:document.getElementById("setPhone").value.trim(),deliveryNote:document.getElementById("setDelivery").value.trim(),payNote:document.getElementById("setPayNote").value.trim(),payQr:pr.style.display!=="none"?pr.src:""};
  saveS(s);toast("璁剧疆宸蹭繚瀛?+(pwd?"锛屽瘑鐮佸凡鏇存柊":""));document.getElementById("setPwd").value="";
}

// ============ IMPORT/EXPORT ============
function exportData(){
  var d={products:loadP(),orders:loadO(),settings:loadS()};
  var b=new Blob([JSON.stringify(d,null,2)],{type:"application/json"});
  var a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="seafood_backup_"+new Date().toISOString().slice(0,10)+".json";a.click();toast("鏁版嵁宸插鍑?);
}
function importData(inp){
  if(!inp.files||!inp.files[0])return;var r=new FileReader();
  r.onload=function(e){try{var d=JSON.parse(e.target.result);if(d.products){saveP(d.products);products=loadP();renderP()}if(d.orders)saveO(d.orders);if(d.settings)saveS(d.settings);renderAdminProds();renderAdminOrders();refreshStats();toast("瀵煎叆鎴愬姛")}catch(ex){toast("瀵煎叆澶辫触锛屾枃浠舵牸寮忎笉姝ｇ‘")}};r.readAsText(inp.files[0]);inp.value="";
}
function resetData(){if(!confirm("纭畾鎭㈠榛樿鍟嗗搧鏁版嵁锛?))return;saveP(JSON.parse(JSON.stringify(defaultProds)));products=loadP();renderP();renderAdminProds();toast("宸叉仮澶嶉粯璁?)}
function exportOrders(){
  var os=loadO();var b=new Blob([JSON.stringify(os,null,2)],{type:"application/json"});
  var a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="orders_"+new Date().toISOString().slice(0,10)+".json";a.click();toast("璁㈠崟宸插鍑?);
}

// ============ SYNC ============
window.addEventListener("storage",function(e){if(e.key===SK){products=loadP();renderP()}});

// ============ INIT ============
renderP();updTotals();
</script>
